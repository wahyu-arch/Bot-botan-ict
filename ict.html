<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengembangan ICT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --header:   #1f2c34;
  --bubble-l: #1f2c34;
  --bubble-r: #005c4b;
  --text:     #e9edef;
  --dim:      #8696a0;
  --divider:  #262d31;
  --green:    #25d366;
  --arka:     #25d366;
  --nova:     #53bdeb;
  --zara:     #cf9fff;
  --yusuf:    #e2b96f;
  --katyusha: #ff6b9d;
}

body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background-size:cover;
  background-position:center;
  
         
  background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
url("https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUybzZpcG01eXpuZjVsc2xvM2xvdnJtZXNzZjk4YTc4MnJjMmZmemMwNCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Lr53F5yLW51xosYd3E/giphy.gif") ;
 
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 100%;
  margin: 0 auto;
}

/* HEADER */
.wa-header {
  background: var(--header);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.back-btn { color: var(--dim); font-size: 22px; }

.grp-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #2a3942;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.grp-info { flex: 1; }
.grp-name { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.grp-sub  { font-size: 12px; color: var(--dim); margin-top: 1px; }

.hdr-badge {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  display: none;
}
.hdr-badge.lanjut { background: rgba(37,211,102,0.2); color: #25d366; }
.hdr-badge.hati   { background: rgba(240,180,41,0.2);  color: #f0b429; }
.hdr-badge.skip   { background: rgba(235,68,68,0.2);   color: #eb4444; }

.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #444; flex-shrink: 0;
  transition: background 0.3s;
}
.dot.on  { background: var(--green); animation: pulse 2s infinite; }
.dot.err { background: #eb4444; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* SESSION CHIPS */
.sess-bar {
  
  border-bottom: 1px solid black;
  padding: 6px 12px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
}
.sess-bar::-webkit-scrollbar { display: none; }

.chip {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid black;
  color: var(--dim);
  transition: all .15s;
  flex-shrink: 0;
}
.chip.active { background: #2a3942; color: var(--text); border-color: #3a4a54; }
.chip.live   { border-color: rgba(37,211,102,.4); color: var(--green); }
.chip.live.active { background: rgba(37,211,102,.1); }

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 16px;
  
  
  display: flex;
  flex-direction: column;
  gap: 2px;
  /* Kunci: scroll tetap di posisi user kecuali user di bagian bawah */
  scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

.day-chip {
  align-self: center;
  background: #182229;
  border-radius: 8px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--dim);
  margin: 10px 0 8px;
}

.round-label {
  align-self: center;
  font-size: 11px;
  color: var(--dim);
  margin: 10px 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.round-label::before, .round-label::after {
  content: '';
  width: 40px; height: 1px;
  background: var(--divider);
}

/* BUBBLES */
.row {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  margin-bottom: 2px;
  animation: fadeUp .15s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

.row.L { align-self: flex-start; }
.row.R { align-self: flex-end; }

.sender {
  font-size: 12.5px; font-weight: 600;
  margin-bottom: 2px; padding-left: 10px;
}
.s-arka{color:var(--arka)} .s-nova{color:var(--nova)} .s-zara{color:var(--zara)} .s-yusuf{color:#e2b96f}

.bubble {
  padding: 7px 10px 5px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}
.bubble.L { background: var(--bubble-l); border-top-left-radius: 0; }
.bubble.R { background: var(--bubble-r); border-top-right-radius: 0; }
.bubble.katyusha-bubble { background: #2d1a2e; border: 1px solid rgba(255,107,157,0.4); border-top-right-radius: 0; }

.foot {
  display: flex; justify-content: flex-end;
  align-items: center; gap: 3px;
  margin-top: 3px;
}
.btime { font-size: 11px; color: rgba(255,255,255,.4); }
.tick  { font-size: 13px; color: #53bdeb; }

/* CONCLUSION */
.conc {
  background: var(--bubble-r);
  border-radius: 8px; border-top-right-radius: 0;
  padding: 8px 11px;
  font-size: 13px;
  line-height: 1.6;
}
.conc-title { font-weight:700; color:var(--nova); margin-bottom:7px; font-size:13px; }
.crow { display:flex; gap:6px; margin-bottom:4px; font-size:12.5px; }
.clbl { color:var(--dim); min-width:80px; flex-shrink:0; }
.cval { color:var(--text); }
.cbar { height:3px; background:rgba(255,255,255,.08); border-radius:3px; margin-top:8px; overflow:hidden; }
.cfill { height:100%; background:linear-gradient(90deg,var(--arka),var(--nova),var(--zara)); border-radius:3px; transition:width 1s ease; }

/* TYPING */
.typing {
  align-self: flex-start;
  background: var(--bubble-l);
  border-radius: 8px; border-top-left-radius: 0;
  padding: 10px 14px;
  display: flex; gap: 4px; align-items: center;
  margin-bottom: 2px;
}
.tdot {
  width: 7px; height: 7px;
  background: var(--dim); border-radius: 50%;
  animation: td 1.2s infinite;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes td { 0%,60%,100%{transform:none;opacity:.4} 30%{transform:translateY(-4px);opacity:1} }

/* LOSS BANNER */
.loss-banner {
  align-self: center;
  background: rgba(235,68,68,.12);
  border: 1px solid rgba(235,68,68,.3);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 12px; color: #fca5a5;
  margin: 6px 0; text-align: center;
}

/* WATCHLIST BAR */
.watchlist-bar {
  
  border-bottom: 1px solid black;
  padding: 8px 14px;
  flex-shrink: 0;
  max-height: 100px;
  overflow-y: auto;
}
.wl-title { font-size: 11px; color: var(--nova); font-weight: 700; margin-bottom: 5px; letter-spacing: 0.5px; }
.wl-item {
  font-size: 11.5px; color: var(--dim);
  display: flex; gap: 8px; align-items: center;
  padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.wl-item:last-child { border-bottom: none; }
.wl-level { color: var(--text); font-weight: 600; font-size: 12px; }
.wl-cond { color: var(--warn); font-size: 10px; font-weight: 700; padding: 1px 5px; background: rgba(240,180,41,0.12); border-radius: 4px; }
.wl-phase { color: var(--nova); font-size: 10px; }
.wl-reason { color: var(--dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* BOTTOM */
.bottom {
  background: var(--header);
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.fake-inp {
  flex: 1;
  background: #2a3942;
  border-radius: 22px;
  padding: 9px 16px;
  font-size: 14px; color: var(--dim);
}
.mic {
  width: 44px; height: 44px;
  background: var(--green); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

/* ── HALAMAN ANALISIS ── */
.analysis-page {
  display: none;
  position: fixed;
  inset: 0;
  background-size:cover;
  background-position:center;
  background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),  url("https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUydnd3dGI4ZndsejBiNjIzYTd3ZHY1M3NoZ3V6bmh6YXd4NWhkYXhicCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/NPwRSSWKyXkbxl8SaX/giphy.gif");
  z-index: 100;
  flex-direction: column;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
}
.analysis-page.open { display: flex; }

.an-header {
  background: var(--header);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--divider);
}
.an-back {
  font-size: 22px; color: var(--dim); cursor: pointer;
  line-height: 1; padding: 4px 8px 4px 0;
}
.an-title { font-size: 16px; font-weight: 700; }

.an-body {
  flex: 1; overflow-y: auto; padding: 16px 14px 24px;
}
.an-body::-webkit-scrollbar { width: 3px; }
.an-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

/* Stat cards */
.stat-cards {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 20px;
}
.stat-card {
  background: var(--header);
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--divider);
}
.stat-card .sc-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
.stat-card .sc-value { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-card .sc-value.green { color: #25d366; }
.stat-card .sc-value.red   { color: #eb4444; }
.stat-card .sc-value.blue  { color: var(--nova); }

/* Chart section */
.chart-section { margin-bottom: 20px; }
.chart-title {
  font-size: 13px; font-weight: 700; color: var(--dim);
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
}

/* Recent trades */
.trade-list { display: flex; flex-direction: column; gap: 8px; }
.trade-item {
  background: var(--header);
  border-radius: 10px;
  padding: 10px 14px;
  border-left: 3px solid var(--divider);
  display: flex; align-items: center; gap: 12px;
}
.trade-item.win  { border-left-color: #25d366; }
.trade-item.loss { border-left-color: #eb4444; }
.trade-item.open { border-left-color: var(--nova); }

.ti-left { flex: 1; }
.ti-sym  { font-size: 13px; font-weight: 700; }
.ti-meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
.ti-pnl  { font-size: 15px; font-weight: 700; }
.ti-pnl.pos { color: #25d366; }
.ti-pnl.neg { color: #eb4444; }
.ti-pnl.neu { color: var(--dim); }

.an-empty {
  text-align: center; color: var(--dim);
  font-size: 13px; padding: 40px 0;
}

/* ── USER CHAT PANEL ── */
.chat-panel {
  display: none;
  position: fixed;
  bottom: 70px; right: 12px;
  width: 320px;
  background: #1f2c34;
  border-radius: 14px;
  border: 1px solid rgba(255,107,157,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 200;
  flex-direction: column;
  overflow: hidden;
  max-height: 420px;
}
.chat-panel.open { display: flex; }

.cp-header {
  background: #2e1a2e;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,107,157,0.2);
}
.cp-header span { font-size: 13px; font-weight: 700; color: #ff6b9d; }
.cp-close { color: var(--dim); cursor: pointer; font-size: 18px; line-height: 1; }

.cp-messages {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.cp-messages::-webkit-scrollbar { width: 3px; }
.cp-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

.cp-msg { max-width: 85%; display: flex; flex-direction: column; }
.cp-msg.user  { align-self: flex-end; }
.cp-msg.bot   { align-self: flex-start; }
.cp-bubble {
  padding: 7px 11px;
  border-radius: 10px;
  font-size: 12.5px; line-height: 1.5;
  word-break: break-word;
}
.cp-msg.user .cp-bubble  { background: #005c4b; border-bottom-right-radius: 3px; }
.cp-msg.bot  .cp-bubble  { background: #2e1a2e; border: 1px solid rgba(255,107,157,.25); border-bottom-left-radius: 3px; }
.cp-name { font-size: 10.5px; color: var(--dim); margin-bottom: 2px; padding-left: 4px; }
.cp-msg.bot .cp-name { color: #ff6b9d; }

.cp-input-row {
  padding: 8px 10px;
  border-top: 1px solid var(--divider);
  display: flex; gap: 6px;
}
.cp-input {
  flex: 1;
  background: #2a3942;
  border: none; outline: none;
  border-radius: 18px;
  padding: 8px 12px;
  font-size: 12.5px; color: var(--text);
  font-family: inherit;
}
.cp-send {
  background: #ff6b9d;
  border: none; border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer; color: white; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Chat trigger button */
.chat-trigger {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #ff6b9d, #c054a0);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(255,107,157,0.4);
  z-index: 201;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.chat-trigger:active { transform: scale(0.92); }
.chat-trigger .notif-dot {
  position: absolute; top: 3px; right: 3px;
  width: 10px; height: 10px;
  background: #f0b429; border-radius: 50%;
  border: 2px solid #0b141a;
  display: none;
}
.chat-trigger.has-notif .notif-dot { display: block; }

/* COIN BADGE di bubble */
.coin-badge {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 8px;
  margin-right: 5px; vertical-align: middle;
  background: rgba(83,189,235,0.15);
  color: var(--nova);
  border: 1px solid rgba(83,189,235,0.3);
}

/* BOT STATUS BAR — status tiap symbol */
.bot-status-bar {
  border-bottom: 1px solid black;
  padding: 6px 12px;
  flex-shrink: 0;
  overflow-x: auto;
  display: flex;
  gap: 6px;
  align-items: center;
}
.bot-status-bar::-webkit-scrollbar { display: none; }

.sym-card {
  background: #1a2830;
  border: 1px solid #2a3a44;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 90px;
}
.sym-card .sym-name { color: var(--nova); font-weight: 700; font-size: 11.5px; }
.sym-card .sym-price { color: var(--text); font-size: 11px; }
.sym-card .sym-phase {
  font-size: 9.5px; font-weight: 600;
  padding: 1px 5px; border-radius: 6px;
  display: inline-block; margin-top: 2px;
  background: rgba(255,255,255,0.06);
  color: var(--dim);
}
.sym-card .sym-phase.h1_scan    { background: rgba(83,189,235,0.12); color: var(--nova); }
.sym-card .sym-phase.fvg_wait   { background: rgba(240,180,41,0.15); color: #f0b429; }
.sym-card .sym-phase.bos_guard  { background: rgba(207,159,255,0.15); color: var(--zara); }
.sym-card .sym-phase.entry_sniper { background: rgba(37,211,102,0.15); color: var(--green); }

/* LIVE FEED PANEL — pesan Hiura saat belum ada sesi */
.live-feed-section {
  align-self: center;
  background: rgba(83,189,235,0.06);
  border: 1px solid rgba(83,189,235,0.2);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--dim);
  margin: 8px 4px;
  max-width: 90%;
  line-height: 1.5;
}
.live-feed-section .lf-sym {
  color: var(--nova); font-weight: 700; font-size: 11px; margin-bottom: 3px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="wa-header" onclick="openAnalysis()" style="cursor:pointer" title="Lihat Analisis">
  <div class="back-btn">‹</div>
  <div class="grp-avatar">🧑‍💻</div>
  <div class="grp-info">
    <div class="grp-name">
      ICT trade discussion 
      <span class="hdr-badge" id="badge"></span>
    </div>
    <div class="grp-sub" id="grpSub">Yusuf · Shina · Senanan · Hiura · Katyusha</div>
  </div>
  <div class="dot" id="dot"></div>
</div>

<!-- SESSION CHIPS -->
<div class="sess-bar" id="sessBar">
  <div class="chip live active" onclick="goLive(this)">🔴 Live</div>
</div>


<!-- BOT STATUS PER SYMBOL -->
<div class="bot-status-bar" id="botStatusBar" style="display:none"></div>

<!-- CHAT -->
<div class="watchlist-bar" id="watchlistBar" style="display:none">
  <div class="wl-title">Watchlist</div>
  <div class="wl-items" id="wlItems"></div>
</div>
<div class="chat" id="chat"></div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="fake-inp">Hanya Admin yang bisa mengirim pesan</div>
  <div class="mic"><button class="mic" id="chatTrigger" onclick="toggleChat()">
  <div class="notif-dot">🔺</div>
</button></div>
</div>

<!-- ── HALAMAN ANALISIS ── -->
<div class="analysis-page" id="analysisPage">
  <div class="an-header" onclick="closeAnalysis()" style="cursor:pointer">
    <div class="an-back">‹</div>
    <div class="an-title">Analisis Trading</div>
  </div>
  <div class="an-body" id="anBody">
    <div class="an-empty">Memuat data...</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  Ganti dengan Railway URL kamu
const BASE_URL = 'https://bot-botan-ict-production.up.railway.app/';
// ══════════════════════════════════════════════

const AI_MAP = {
  ai1:   { label: '🦅 Hiura',   cls: 's-arka',  side: 'L' },  // AI-1 M15 Analyst
  ai2:   { label: '🐕 Senanan', cls: 's-nova',  side: 'L' },  // AI-2 IDM Hunter
  ai3:   { label: '🐅 Shina',   cls: 's-zara',  side: 'L' },  // AI-3 BOS/MSS Guard
  ai4:   { label: '🐉 Yusuf',   cls: 's-yusuf', side: 'R' },  // AI-4 Entry Sniper
  yusuf: { label: '🐉 Yusuf',   cls: 's-yusuf', side: 'R' },  // Yusuf coordinator
  system:{ label: '🎭 Admin',      cls: 's-nova',  side: 'L' },  // System msg
  'ai-1':{ label: 'Hiura',   cls: 's-arka',  side: 'L' },
  'ai-2':{ label: 'Senanan', cls: 's-nova',  side: 'L' },
  'ai-3':{ label: 'Shina',   cls: 's-zara',  side: 'L' },
  'ai-4':{ label: 'Yusuf',   cls: 's-yusuf', side: 'R' },
  katyusha:{ label: '🎯 Katyusha', cls: 's-katyusha', side: 'R' },
  'katyusha':{ label: '🎯 Katyusha', cls: 's-katyusha', side: 'R' },
};

function aiOf(key) {
  return AI_MAP[key] || { label: key, cls: 's-arka', side: 'L' };
}

let sessions     = [];
let currId       = null;   // null = live mode
let rendered     = 0;
let hasConclusion= false;

// ── Scroll: auto-scroll hanya jika user sudah di bawah ──
function isAtBottom() {
  const c = document.getElementById('chat');
  return c.scrollHeight - c.scrollTop - c.clientHeight < 80;
}
function scrollBottom() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

// ── POLL ─────────────────────────────────────
async function get(path) {
  const r = await fetch(BASE_URL + path, { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function poll() {
  try {
    // Refresh session chips
    const list = await get('/api/sessions');
    sessions = list;
    buildChips();

    // Fetch data sesuai mode
    const data = currId
      ? await get(`/api/sessions/${currId}`)
      : await get('/api/live');

    if (!data || data.status === 'idle') {
      setDot('on');
      return;
    }

    // Sesi baru di live mode
    if (!currId && data.id && data.id !== window._liveId) {
      window._liveId = data.id;
      rendered = 0;
      hasConclusion = false;
      clearChat();
      renderDayChip(data.started_at, data.loss_context);
    }

    injectMessages(data.messages || [], data.conclusion, data.status);
    // Fetch watchlist
    // Fetch watchlist + symbols status
    const [wl, syms] = await Promise.all([
      get('/api/watchlist').catch(()=>null),
      get('/api/symbols').catch(()=>null),
    ]);
    renderWatchlist(wl || [], syms);

    // Update subtitle dengan symbol aktif
    if (syms && syms.symbols) {
      document.getElementById('grpSub').textContent =
        syms.symbols.join(' · ') + ' · Hiura · Senanan · Shina · Yusuf · Katyusha';
    }
    // Fetch bot status per symbol
    const botSt = await get('/api/bot_status').catch(()=>null);
    renderBotStatus(botSt || []);

    // Kalau live mode dan tidak ada sesi aktif, tampilkan live feed
    if (!currId && (!data || data.status === 'idle')) {
      const feed = await get('/api/live/feed').catch(()=>null);
      renderLiveFeed(feed || []);
    }

    setDot('on');
  } catch(e) {
    setDot('err');
  }
}

setInterval(poll, 3000);
poll();

// ── SESSION CHIPS ─────────────────────────────
function buildChips() {
  const bar = document.getElementById('sessBar');
  const liveActive = currId === null;
  let html = `<div class="chip live ${liveActive?'active':''}" onclick="goLive(this)">🔴 Live</div>`;
  sessions.slice(0, 10).forEach((s, i) => {
    const n = sessions.length - i;
    const icon = s.loss_context ? '🔴' : '💬';
    const active = currId === s.id ? 'active' : '';
    html += `<div class="chip ${active}" onclick="goSess('${s.id}',this)">${icon} Sesi ${n}</div>`;
  });
  bar.innerHTML = html;
}

async function goLive(el) {
  currId = null;
  rendered = 0;
  hasConclusion = false;
  window._liveId = null;
  clearChat();
  buildChips();
  poll();
}

async function goSess(id, el) {
  currId = id;
  rendered = 0;
  hasConclusion = false;
  clearChat();
  buildChips();
  const data = await get(`/api/sessions/${id}`).catch(()=>null);
  if (data) {
    renderDayChip(data.started_at, data.loss_context);
    injectMessages(data.messages || [], data.conclusion, data.status);
  }
}

// ── RENDER ────────────────────────────────────
function clearChat() {
  document.getElementById('chat').innerHTML = '';
}

function renderDayChip(ts, lossCtx) {
  const chat = document.getElementById('chat');
  const d = ts
    ? new Date(ts).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'})
    : 'Hari ini';
  chat.insertAdjacentHTML('beforeend', `<div class="day-chip">${d}</div>`);
  if (lossCtx) {
    chat.insertAdjacentHTML('beforeend', `<div class="loss-banner">⚠️ Mode Reiterasi Loss</div>`);
  }
}

function injectMessages(messages, conclusion, status, isReplay = false) {
  // Simpan untuk re-render saat filter
  if (!isReplay) {
    window._lastMessages = messages;
    window._lastConclusion = conclusion;
    window._lastStatus = status;
    // Reset live feed counter saat masuk sesi baru
    _liveFeedRendered = 0;
  }
  const chat  = document.getElementById('chat');
  const wasAtBottom = isAtBottom();

  const newMsgs = messages.slice(rendered);
  let lastRonde = -1;

  removeTyping();

  newMsgs.forEach((msg, idx) => {
    // Filter per koin kalau aktif
    if (_activeCoinFilter && msg.symbol && msg.symbol !== _activeCoinFilter) return;
    const globalIdx = rendered + idx;
    const ronde = msg.ronde || (Math.floor(globalIdx / 2) + 1);

    // Ronde divider
    if (ronde !== lastRonde) {
      lastRonde = ronde;
      const labels = { 0:'Yusuf — Opening', 1:'Analisis', 2:'Monitoring', 5:'🎯 Katyusha — Review', 99:'Kesimpulan' };
      chat.insertAdjacentHTML('beforeend',
        `<div class="round-label">${labels[ronde] || 'Ronde ' + ronde}</div>`);
    }

    const ai   = aiOf(msg.ai || 'arka');
    const isKatyusha = (msg.ai || '').toLowerCase() === 'katyusha';
    const side = (msg.side === 'right' || isKatyusha) ? 'R' : ai.side || 'L';
    const bubbleCls = isKatyusha ? 'katyusha-bubble' : side;
    const txt  = clean(msg.pesan || '');
    const ts   = msg.timestamp
      ? new Date(msg.timestamp).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})
      : '';
    const senderAlign = side === 'R' ? 'text-align:right;padding-right:10px;padding-left:0' : '';

    const coinBadge = msg.symbol ? `<span class="coin-badge">${msg.symbol.replace('USDT','')}</span>` : '';
    chat.insertAdjacentHTML('beforeend', `
      <div class="row ${side}">
        <div class="sender ${ai.cls}" style="${senderAlign}">${ai.label}${msg.symbol ? ' <span style="font-size:10px;color:var(--dim)">· ' + msg.symbol.replace('USDT','') + '</span>' : ''}</div>
        <div class="bubble ${isKatyusha ? 'katyusha-bubble' : side}">${esc(txt)}
          <div class="foot">
            <span class="btime">${ts}</span>
            <span class="tick"></span>
          </div>
        </div>
      </div>`);
  });

  rendered = messages.length;

  // Typing indicator
  

  // Update badge consensus saja — Yusuf sudah closing di chat
  if (conclusion && !hasConclusion) {
    hasConclusion = true;
    setBadge(conclusion.consensus);
  }

  // Scroll hanya kalau user memang sudah di bawah sebelum inject
  if (wasAtBottom) scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function renderConclusion(c, chat) {
  const conf = Math.round((c.avg_panel_confidence || 0) * 100);
  const ts   = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  const rows = [
    c.poin_sepakat      && ['✅ Sepakat',  c.poin_sepakat],
    c.entry_ideal_zona  && ['🎯 Entry',   c.entry_ideal_zona],
    c.entry_ideal_timing&& ['⏱ Timing',  c.entry_ideal_timing],
    c.entry_plan_b      && ['🔄 Plan B',  c.entry_plan_b],
    c.risiko_utama      && ['⚠️ Risiko',  c.risiko_utama],
    c.kondisi_reentry   && ['🔁 Reentry', c.kondisi_reentry],
    c.poin_debat        && ['⚡ Debat',   c.poin_debat],
  ].filter(Boolean);

  const rowsHtml = rows.map(([l,v])=>
    `<div class="crow"><div class="clbl">${l}</div><div class="cval">${esc(v)}</div></div>`
  ).join('');

  chat.insertAdjacentHTML('beforeend', `
    <div class="row R">
      <div class="sender s-nova" style="text-align:right;padding-right:10px">📊 Nova — Kesimpulan</div>
      <div class="conc">
        <div class="conc-title">📋 Ringkasan Diskusi</div>
        ${rowsHtml}
        ${conf>0?`<div class="cbar"><div class="cfill" style="width:${conf}%"></div></div>
          <div style="font-size:10.5px;color:rgba(255,255,255,.35);text-align:right;margin-top:4px">Confidence: ${conf}%</div>`:''}
        <div class="foot"><span class="btime">${ts}</span><span class="tick">✓✓</span></div>
      </div>
    </div>`);
}

// ── BADGE & DOT ──────────────────────────────
function renderWatchlist(items, symsData) {
  const bar = document.getElementById('watchlistBar');
  const container = document.getElementById('wlItems');
  bar.style.display = 'block';

  // Render symbols pills kalau ada
  let symHtml = '';
  if (symsData && symsData.symbols) {
    symHtml = '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">' +
      symsData.symbols.map(s => {
        const st = symsData.status[s] || {};
        const cnt = st.watchlist_active || 0;
        return `<span style="background:#1a3040;border:1px solid #2a4050;border-radius:10px;padding:2px 8px;font-size:10.5px;color:${cnt>0?'var(--nova)':'var(--dim)'}">${s} ${cnt>0?'<b>'+cnt+'</b>':'∅'}</span>`;
      }).join('') + '</div>';
  }

  if (!items || !items.length) {
    container.innerHTML = symHtml + '<div style="color:var(--dim);font-size:11px;padding:2px 0">Belum ada watchlist aktif</div>';
    return;
  }

  // Group by symbol
  const bySymbol = {};
  items.forEach(i => {
    const sym = i.symbol || 'ALL';
    if (!bySymbol[sym]) bySymbol[sym] = [];
    bySymbol[sym].push(i);
  });

  let html = symHtml;
  Object.entries(bySymbol).forEach(([sym, syItems]) => {
    if (Object.keys(bySymbol).length > 1) {
      html += `<div style="font-size:10px;color:var(--nova);font-weight:700;margin:4px 0 2px">${sym}</div>`;
    }
    html += syItems.map(i => {
      const done = i.triggered;
      return `<div class="wl-item" style="${done?'opacity:0.3;text-decoration:line-through':''}">
        <span class="wl-level">${parseFloat(i.level).toFixed(2)}</span>
        <span class="wl-cond">${(i.condition||'').replace(/_/g,' ').toUpperCase()}</span>
        <span class="wl-phase">[${(i.phase||'').replace(/_/g,' ')}]</span>
        <span class="wl-reason">${esc(i.reason||'')}</span>
        ${done?'<span style="color:#25d366;font-size:10px;margin-left:auto">✓</span>':''}
      </div>`;
    }).join('');
  });
  container.innerHTML = html;
}

function setBadge(consensus) {
  if (!consensus) return;
  const el = document.getElementById('badge');
  el.textContent = consensus.replace(/_/g,' ');
  el.className = 'hdr-badge ' +
    (consensus.includes('lanjut') ? 'lanjut' :
     consensus.includes('hati')   ? 'hati'   : 'skip');
  el.style.display = 'inline-block';
}

function setDot(s) {
  document.getElementById('dot').className = 'dot ' + s;
}

// ── UTILS ────────────────────────────────────
function clean(s) {
  // Hapus semua prefix nama AI di awal pesan
  return String(s||'').replace(/^(👤\s*Yusuf|🔭\s*Arka|📊\s*Nova|🔍\s*Zara|Katyusha|Yusuf|Hiura|Senanan|Shina|Arka|Nova|Zara|AI-1|AI-2|AI-3|AI-4)\s*[:\-]\s*/i,'').trim();
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ── HALAMAN ANALISIS ──────────────────────────────
function openAnalysis() {
  document.getElementById('analysisPage').classList.add('open');
  loadStats();
}

function closeAnalysis() {
  document.getElementById('analysisPage').classList.remove('open');
}

async function loadStats() {
  const body = document.getElementById('anBody');
  body.innerHTML = '<div class="an-empty">Memuat...</div>';
  try {
    const s = await get('/api/stats');
    renderStats(s);
  } catch(e) {
    body.innerHTML = '<div class="an-empty">❌ Gagal memuat data.<br>Pastikan Railway URL sudah benar.</div>';
  }
}

function renderStats(s) {
  const body = document.getElementById('anBody');
  const pnlCls = s.total_pnl > 0 ? 'green' : s.total_pnl < 0 ? 'red' : '';
  const wrCls  = s.win_rate >= 50 ? 'green' : 'red';

  // Stat cards
  let html = `<div class="stat-cards">
    <div class="stat-card">
      <div class="sc-label">Total Trade</div>
      <div class="sc-value blue">${s.total_trades}</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Win Rate</div>
      <div class="sc-value ${wrCls}">${s.win_rate}%</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Win / Loss</div>
      <div class="sc-value"><span style="color:#25d366">${s.wins}</span> / <span style="color:#eb4444">${s.losses}</span></div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Total PnL</div>
      <div class="sc-value ${pnlCls}">${s.total_pnl >= 0 ? '+' : ''}${s.total_pnl.toFixed(2)}</div>
    </div>
  </div>`;



  // Recent trades
  const trades = s.recent_trades || [];
  html += `<div class="chart-section"><div class="chart-title">Trade Terbaru</div>`;
  if (!trades.length) {
    html += `<div class="an-empty">Belum ada trade tercatat.</div>`;
  } else {
    html += `<div class="trade-list">`;
    trades.forEach(t => {
      const res  = t.result || 'open';
      const pnl  = t.pnl != null ? parseFloat(t.pnl) : null;
      const pnlStr = pnl != null ? (pnl >= 0 ? '+' + pnl.toFixed(4) : pnl.toFixed(4)) : '—';
      const pnlCls = pnl == null ? 'neu' : pnl > 0 ? 'pos' : 'neg';
      const sym  = t.symbol || '—';
      const dir  = (t.direction || '').toUpperCase();
      const ts   = t.timestamp ? new Date(t.timestamp).toLocaleDateString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const rr   = t.rr ? ` | RR ${parseFloat(t.rr).toFixed(1)}` : '';
      html += `<div class="trade-item ${res}">
        <div class="ti-left">
          <div class="ti-sym">${sym} <span style="font-size:11px;color:var(--dim)">${dir}</span></div>
          <div class="ti-meta">${ts}${rr}</div>
        </div>
        <div class="ti-pnl ${pnlCls}">${pnlStr}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  body.innerHTML = html;
}

<script>
// ── USER CHAT ─────────────────────────────────────────────
let _cpLastCount = 0;

function toggleChat() {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('chatTrigger').classList.remove('has-notif');
    document.getElementById('cpInput').focus();
    scrollCpBottom();
  }
}

async function sendChat() {
  const inp = document.getElementById('cpInput');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';

  // Tampilkan pesan user
  appendCpMsg('user', 'Kamu', msg);

  // Kirim ke API
  try {
    await fetch(BASE_URL + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg}),
    });
    // Tunggu jawaban Katyusha
    appendCpMsg('bot', 'Katyusha', '...');
  } catch(e) {
    appendCpMsg('bot', 'Katyusha', 'Error kirim pesan.');
  }
}

function appendCpMsg(role, name, text) {
  const box = document.getElementById('cpMessages');
  const div = document.createElement('div');
  div.className = 'cp-msg ' + role;
  div.innerHTML = `<div class="cp-name">${name}</div><div class="cp-bubble" id="cp-${Date.now()}">${esc(text)}</div>`;
  box.appendChild(div);
  scrollCpBottom();
}

function scrollCpBottom() {
  const box = document.getElementById('cpMessages');
  box.scrollTop = box.scrollHeight;
}

// Poll chat history
async function pollChat() {
  try {
    const msgs = await get('/api/chat');
    if (!msgs || msgs.length === _cpLastCount) return;

    const newMsgs = msgs.slice(_cpLastCount);
    _cpLastCount = msgs.length;

    const panel = document.getElementById('chatPanel');
    newMsgs.forEach(m => {
      // Hapus "..." placeholder kalau ada
      const allBubbles = document.querySelectorAll('.cp-bubble');
      const dots = allBubbles[allBubbles.length - 1];
      if (dots && dots.textContent === '...') dots.closest('.cp-msg')?.remove();

      if (m.role === 'katyusha') {
        appendCpMsg('bot', 'Katyusha', m.content);
        if (!panel.classList.contains('open')) {
          document.getElementById('chatTrigger').classList.add('has-notif');
        }
      }
    });
  } catch(e) {}
}

// ── BOT STATUS PER SYMBOL ─────────────────────────────
function renderBotStatus(items) {
  const bar = document.getElementById('botStatusBar');
  if (!items || !items.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  bar.innerHTML = items.map(s => {
    const sym   = s.symbol || '';
    const name  = sym.replace('USDT','');
    const phase = s.phase || 'h1_scan';
    const price = s.price ? parseFloat(s.price) : 0;

    // Format harga: kalau < 0.01 pakai 6 desimal
    const priceStr = price === 0 ? '—'
      : price < 0.01 ? price.toFixed(6)
      : price < 1    ? price.toFixed(4)
      : price < 100  ? price.toFixed(3)
      : price.toFixed(2);

    const phaseLabel = {
      'h1_scan':      'Scanning',
      'fvg_wait':     'FVG Wait',
      'bos_guard':    'BOS Guard',
      'entry_sniper': 'Entry!',
    }[phase] || phase;

    const wl = s.wl_count || 0;
    return `<div class="sym-card" onclick="filterByCoin('${sym}')" title="Klik untuk filter chat ${sym}">
      <div class="sym-name">${name} ${wl > 0 ? '<b style="color:var(--green)">●</b>' : '○'}</div>
      <div class="sym-price">${priceStr}</div>
      <div class="sym-phase ${phase}">${phaseLabel}</div>
    </div>`;
  }).join('');
}

// Filter chat berdasarkan koin
let _activeCoinFilter = null;
function filterByCoin(symbol) {
  if (_activeCoinFilter === symbol) {
    _activeCoinFilter = null;  // toggle off
    document.getElementById('grpSub').textContent = 'Yusuf · Shina · Senanan · Hiura · Katyusha';
  } else {
    _activeCoinFilter = symbol;
    const name = symbol.replace('USDT','');
    document.getElementById('grpSub').textContent = `Filter: ${name} · klik kartu lagi untuk semua`;
  }
  // Re-render pesan dengan filter
  if (window._lastMessages) {
    clearChat();
    injectMessages(window._lastMessages, window._lastConclusion, window._lastStatus, true);
  }
}

// ── LIVE FEED (tampil saat idle, sebelum ada BOS) ─────────────────
let _liveFeedRendered = 0;
function renderLiveFeed(items) {
  const chat = document.getElementById('chat');
  if (!items.length) return;

  const newItems = items.slice(_liveFeedRendered);
  if (!newItems.length) return;
  _liveFeedRendered = items.length;

  const wasAtBottom = isAtBottom();

  newItems.forEach(m => {
    if (_activeCoinFilter && m.symbol && m.symbol !== _activeCoinFilter) return;
    const sym = m.symbol ? m.symbol.replace('USDT','') : '';
    const symBadge = sym ? `<span class="coin-badge">${sym}</span>` : '';
    const ts = m.timestamp
      ? new Date(m.timestamp).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})
      : '';
    chat.insertAdjacentHTML('beforeend', `
      <div class="live-feed-section">
        <div class="lf-sym">${symBadge} ${m.nama || 'Hiura'} · Scanning</div>
        ${esc(m.pesan || '')}
        <div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:4px;text-align:right">${ts}</div>
      </div>`);
  });

  if (wasAtBottom) scrollBottom();
}

setInterval(pollChat, 2000);
</script>
